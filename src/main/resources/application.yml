server:
  port: 8080

spring:
  application:
    name: RESQ
  datasource:
    url: ${DB_URL:jdbc:h2:mem:resqdb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

aris:
  jwt:
    secret: ${JWT_SECRET:YXJpcy1lbWVyZ2VuY3ktYW1idWxhbmNlLXJvdXRpbmctaW50ZWxsaWdlbmNlLXN5c3RlbS1zdXBlci1zZWNyZXQta2V5LTIwMjQ=}
    expiration-ms: 86400000
  osrm:
    base-url: https://router.project-osrm.org
  nominatim:
    base-url: https://nominatim.openstreetmap.org
