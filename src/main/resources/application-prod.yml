# ═══════════════════════════════════════════════
# RESQ — Production Configuration (Railway-optimized)
# ═══════════════════════════════════════════════

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript
    min-response-size: 1024

spring:
  application:
    name: RESQ
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:resq_db}
    username: ${PGUSER:resq_user}
    password: ${PGPASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
  thymeleaf:
    cache: true
    prefix: classpath:/templates/
    suffix: .html
  h2:
    console:
      enabled: false

aris:
  jwt:
    secret: ${JWT_SECRET:ZGVmYXVsdC1kZXYtc2VjcmV0LWtleS1mb3ItcmVzcS1hcHBsaWNhdGlvbi0yMDI0}
    expiration-ms: 86400000
  osrm:
    base-url: ${OSRM_BASE_URL:https://router.project-osrm.org}
  nominatim:
    base-url: ${NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}

logging:
  level:
    root: WARN
    com.aris: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
