# ═══════════════════════════════════════════════════
# RESQ — Docker Compose Production Stack
# Services: PostgreSQL 15 + RESQ App + Nginx Reverse Proxy
# ═══════════════════════════════════════════════════

version: '3.9'

services:

  # ── PostgreSQL Database ──
  postgres:
    image: postgres:15-alpine
    container_name: resq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: resq_db
      POSTGRES_USER: ${DB_USER:-resq_user}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-resq_user} -d resq_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resq_network

  # ── RESQ Application ──
  resq-app:
    build: .
    container_name: resq_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/resq_db
      DB_USER: ${DB_USER:-resq_user}
      DB_PASS: ${DB_PASS:-changeme}
      JWT_SECRET: ${JWT_SECRET:-ZGVmYXVsdC1kZXYtc2VjcmV0LWtleQ==}
      OSRM_BASE_URL: ${OSRM_BASE_URL:-https://router.project-osrm.org}
      NOMINATIM_BASE_URL: ${NOMINATIM_BASE_URL:-https://nominatim.openstreetmap.org}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_logs:/var/log/resq
    networks:
      - resq_network

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: resq_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - resq-app
    networks:
      - resq_network

volumes:
  postgres_data:
  app_logs:
  nginx_logs:

networks:
  resq_network:
    driver: bridge
